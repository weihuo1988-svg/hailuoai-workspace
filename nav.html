<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>七栖 · 产品矩阵</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .back-home {
      position: fixed;
      top: 24px;
      right: 28px;
      font-size: 13px;
      color: #555;
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }
    .back-home:hover { color: #c9a96e; }

    .avatar {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #c9a96e, #8b6f3e);
      border-radius: 50%;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 6px;
      letter-spacing: 0.08em;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 48px;
      letter-spacing: 0.15em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      max-width: 560px;
      width: 100%;
    }

    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 28px 24px;
      text-decoration: none;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover {
      border-color: var(--accent);
      background: #1c1c1c;
      transform: translateY(-2px);
    }

    .card:hover::before { opacity: 1; }

    .card-icon { font-size: 28px; margin-bottom: 4px; }
    .card-name { font-size: 15px; font-weight: 600; color: #fff; }
    .card-desc { font-size: 12px; color: #666; line-height: 1.5; }

    .card-tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--accent-dim, #2a2a2a);
      color: var(--accent, #888);
      margin-top: 4px;
      letter-spacing: 0.05em;
    }

    /* 各项目 accent 色 */
    .card-mc   { --accent: #7dd3a0; --accent-dim: rgba(125,211,160,0.12); }
    .card-port { --accent: #c9a96e; --accent-dim: rgba(201,169,110,0.12); }
    .card-slp  { --accent: #9eb8ff; --accent-dim: rgba(158,184,255,0.12); }
    .card-art  { --accent: #f4a0b5; --accent-dim: rgba(244,160,181,0.12); }

    .footer {
      margin-top: 48px;
      font-size: 11px;
      color: #3a3a3a;
      letter-spacing: 0.1em;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <a href="/" class="back-home">← 主页</a>

  <div class="avatar">🍄</div>
  <h1>七栖 · 产品矩阵</h1>
  <p class="subtitle">SELECTED WORKS · 2026</p>

  <div class="grid">

    <!-- portfolio 直接指向根路径 / -->
    <a href="/" class="card card-port">
      <div class="card-icon">🎨</div>
      <div class="card-name">portfolio</div>
      <div class="card-desc">作品集展示<br/>个人项目与设计作品集</div>
      <span class="card-tag">Website</span>
    </a>

    <a href="/mc-task-app/" class="card card-mc">
      <div class="card-icon">⛏️</div>
      <div class="card-name">mc-task-app</div>
      <div class="card-desc">我的世界习惯养成助手<br/>帮助孩子在游戏中建立好习惯</div>
      <span class="card-tag">WebApp</span>
    </a>

    <a href="/sleep-aid/" class="card card-slp">
      <div class="card-icon">🌙</div>
      <div class="card-name">sleep-aid</div>
      <div class="card-desc">睡眠辅助<br/>助眠音频 + 睡眠记录</div>
      <span class="card-tag">WebApp</span>
    </a>

    <a href="/art-chat/" class="card card-art">
      <div class="card-icon">🖼️</div>
      <div class="card-name">art-chat</div>
      <div class="card-desc">小画家对话助手<br/>AI 引导孩子讲述画作故事</div>
      <span class="card-tag">WebApp</span>
    </a>

  </div>

  <p class="footer">© 2026 七栖 · 部署于阿里云</p>

</body>
</html>
