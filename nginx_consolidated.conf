# =============================================================================
# 四项目整合 · Nginx 配置
# portfolio = 根路径（/）入口，承载导航页功能
# =============================================================================

upstream mc_task_api {
    server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
}

upstream sleep_aid_api {
    server 127.0.0.1:3002 max_fails=3 fail_timeout=30s;
}

server {
    listen 80 default_server;
    server_name _;

    root /var/www/consolidated/portfolio;   # portfolio 为根目录（同时是导航入口）
    index index.html;

    # 根路径 / → portfolio
    location = / {
        try_files $uri $uri/ /index.html;
    }

    # ── mc-task-app ────────────────────────────────────────────────────
    location /mc-task-app/ {
        alias /var/www/consolidated/mc-task-app/;
        index index.html;
        try_files $uri $uri/ /mc-task-app/index.html;
    }

    location /api/mc-task/ {
        proxy_pass http://mc_task_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── sleep-aid ──────────────────────────────────────────────────────
    location /sleep-aid/ {
        alias /var/www/consolidated/sleep-aid/;
        index index.html;
        try_files $uri $uri/ /sleep-aid/index.html;
    }

    location /api/sleep-aid/ {
        proxy_pass http://sleep_aid_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── art-chat ───────────────────────────────────────────────────────
    location /art-chat/ {
        alias /var/www/consolidated/art-chat/;
        index index.html;
        try_files $uri $uri/ /art-chat/index.html;
    }

    # ── 静态资源缓存 ───────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
